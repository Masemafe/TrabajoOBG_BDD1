version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: deportes_db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: deportes_uni
      MYSQL_USER: deportes_user
      MYSQL_PASSWORD: deportes_pass
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: deportes_backend
    environment:
      DB_HOST: db
      DB_USER: deportes_user
      DB_PASSWORD: deportes_pass
      DB_NAME: deportes_uni
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: deportes_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
